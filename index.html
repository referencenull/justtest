<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motocross Inventory Manager</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Motocross Inventory Manager</h1>
        <p>Browse gear and bike parts, add new items, delete products, and update quantities.</p>
        <button id="confetti-btn" type="button" class="confetti-btn">Celebrate</button>
      </header>

      <section class="panel">
        <h2>Add Product</h2>
        <form id="add-product-form" class="form-grid">
          <input id="name" name="name" type="text" placeholder="Product name" required />
          <input id="category" name="category" type="text" placeholder="Category" required />
          <input id="price" name="price" type="number" min="0" step="0.01" placeholder="Price" required />
          <input id="quantity" name="quantity" type="number" min="0" step="1" placeholder="Quantity" required />
          <button type="submit">Add Product</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Inventory</h2>
          <input id="search" type="search" placeholder="Search by name or category" />
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="inventory-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  </body>
</html>
